<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ report_title }} - {{ property_display_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html { height: 100%; }
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 2rem; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .channel-chip { cursor: pointer; border: 1px solid #dee2e6; border-radius: 20px; padding: 2px 12px; margin: 2px; display: inline-block; font-size: 0.85rem; transition: all 0.2s; background: white; }
        .channel-chip:hover { border-color: #0d6efd; }
        .channel-chip.active { background-color: #0d6efd; color: white; border-color: #0d6efd; }
    </style>
</head>
<body>

<header class="navbar navbar-expand-lg navbar-light bg-light border-bottom mb-4">
    <div class="container-fluid">
        <div class="d-flex align-items-baseline">
            <h1 class="h3 mb-0 me-4">{{ report_title }}</h1>
            <span class="text-muted me-4">{{ property_display_name }} ({{ property_id }})</span>
            <span class="text-muted me-4">{{ date_range }}</span>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="https://github.com/liamdelahunty/ga4-api-explorer" target="_blank">GitHub</a>
                </li>
            </ul>
        </div>
    </div>
</header>

<main class="container py-4 flex-grow-1">
    <div class="card">
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-4 border-end">
                    <label for="metricSelect" class="form-label fw-bold">1. Rank & Default to Top 5:</label>
                    <select id="metricSelect" class="form-select">
                        <option value="sessions" selected>Sessions</option>
                        <option value="engaged">Engaged Sessions</option>
                        <option value="users">Active Users</option>
                        <option value="leads">Leads</option>
                    </select>
                    <div class="form-text mt-2">Changing this resets selection to the top 5 for this metric.</div>
                </div>
                <div class="col-md-8 px-4">
                    <label class="form-label fw-bold">2. Customise Chart Comparison (Click to toggle):</label>
                    <div id="channelSelector" class="p-2 rounded bg-light" style="max-height: 120px; overflow-y: auto;">
                        {% for channel in channels %}
                        <div class="channel-chip" data-channel="{{ channel }}">{{ channel }}</div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <div style="height: 500px;">
                <canvas id="topTrendChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3>Channel Performance Data Summary</h3>
            <div id="tableContent" class="table-responsive">
                <!-- Table will be injected here -->
            </div>
        </div>
    </div>
</main>

<footer class="mt-3 bg-light border-top py-4">    
    <div class="container text-center text-secondary">
        <p>
            <a href="https://github.com/liamdelahunty/ga4-api-explorer" target="_blank">Github: ga4-api-explorer</a>
         </p>
    </div>
</footer>

<script>
    const rawData = {{ json_data | safe }};
    const months = {{ months | safe }};
    const allChannels = {{ channels | safe }};
    let activeChannels = new Set();
    let chart = null;

    const metricLabels = {
        sessions: 'Sessions',
        engaged: 'Engaged Sessions',
        users: 'Active Users',
        leads: 'Leads'
    };

    const colors = [
        '#0d6efd', '#dc3545', '#198754', '#ffc107', '#0dcaf0', '#6610f2', '#fd7e14', '#20c997', '#e83e8c', '#6f42c1'
    ];

    function calculateTotals(metricKey) {
        return allChannels.map(ch => {
            const total = months.reduce((sum, m) => {
                const val = (rawData[ch] && rawData[ch][m]) ? Number(rawData[ch][m][metricKey]) : 0;
                return sum + val;
            }, 0);
            return { name: ch, total: total };
        });
    }

    function onMetricChange() {
        const metricKey = document.getElementById('metricSelect').value;
        const totals = calculateTotals(metricKey);
        
        // Reset selection to the new Top 5 for the CHART
        const top5 = totals.sort((a, b) => b.total - a.total).slice(0, 5).map(c => c.name);
        activeChannels = new Set(top5);
        
        updateView();
    }

    function updateView() {
        const metricKey = document.getElementById('metricSelect').value;
        const allTotals = calculateTotals(metricKey);

        // CHART Data: Filter all totals down to only what is in activeChannels
        const chartDataList = allTotals.filter(ct => activeChannels.has(ct.name))
                                         .sort((a, b) => b.total - a.total);

        // TABLE Data: Always show ALL channels
        const tableDataList = [...allTotals].sort((a, b) => b.total - a.total);

        // Update Chips UI
        document.querySelectorAll('.channel-chip').forEach(chip => {
            const chName = chip.getAttribute('data-channel');
            if (activeChannels.has(chName)) {
                chip.classList.add('active');
            } else {
                chip.classList.remove('active');
            }
        });

        // Prepare Chart Datasets
        const datasets = chartDataList.map((ch, index) => {
            const dataPoints = months.map(m => (rawData[ch.name] && rawData[ch.name][m]) ? Number(rawData[ch.name][m][metricKey]) : 0);
            return {
                label: ch.name,
                data: dataPoints,
                borderColor: colors[index % colors.length],
                backgroundColor: colors[index % colors.length] + '22',
                fill: false,
                tension: 0.3,
                borderWidth: 3,
                pointRadius: 4
            };
        });

        const ctx = document.getElementById('topTrendChart').getContext('2d');
        if (chart) chart.destroy();
        
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: months, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: metricLabels[metricKey] } }
                },
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        // Update Table - Always show ALL rows
        let html = '<table class="table table-striped"><thead><tr><th>Channel</th><th>Total ' + metricLabels[metricKey] + '</th>';
        months.forEach(m => html += '<th>' + m + '</th>');
        html += '</tr></thead><tbody>';

        tableDataList.forEach((ch, index) => {
            const isCharted = activeChannels.has(ch.name);
            const chartedIndex = chartDataList.findIndex(c => c.name === ch.name);
            const color = isCharted ? colors[chartedIndex % colors.length] : '#dee2e6';
            
            html += `<tr>
                <td class="fw-bold"><span class="legend-dot" style="background:${color}"></span>${ch.name}</td>
                <td class="table-primary fw-bold">${ch.total.toLocaleString()}</td>`;
            months.forEach(m => {
                const val = (rawData[ch.name] && rawData[ch.name][m]) ? Number(rawData[ch.name][m][metricKey]) : 0;
                html += `<td>${val.toLocaleString()}</td>`;
            });
            html += '</tr>';
        });

        html += '</tbody></table>';
        document.getElementById('tableContent').innerHTML = html;
    }

    // Toggle chart inclusion
    document.querySelectorAll('.channel-chip').forEach(chip => {
        chip.addEventListener('click', function() {
            const chName = this.getAttribute('data-channel');
            if (activeChannels.has(chName)) {
                activeChannels.delete(chName);
            } else {
                activeChannels.add(chName);
            }
            updateView();
        });
    });

    document.getElementById('metricSelect').addEventListener('change', onMetricChange);
    
    // Initial load
    onMetricChange();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
