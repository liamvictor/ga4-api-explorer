<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ report_title }} - {{ property_display_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 2rem; }
        .table-container { background: white; padding: 1.5rem; border-radius: 8px; }
        .header-section { background: #212529; color: white; padding: 2rem 0; margin-bottom: 2rem; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="container">
        <h1>{{ report_title }}</h1>
        <p class="lead mb-0">Property: {{ property_display_name }} ({{ property_id }})</p>
        <p>Date Range: {{ date_range }}</p>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-4">
                    <label for="channelSelect" class="form-label fw-bold">Select Channel to View Trend:</label>
                    <select id="channelSelect" class="form-select">
                        {% for channel in channels %}
                        <option value="{{ channel }}">{{ channel }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div style="height: 400px;">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3 id="tableTitle">Data for: All Channels</h3>
            <div id="tableContent" class="table-responsive">
                <!-- Table will be injected here -->
            </div>
        </div>
    </div>
</div>

<script>
    const rawData = {{ json_data | safe }};
    const months = {{ months | safe }};
    let chart = null;

    function updateView(channel) {
        const data = rawData[channel];
        const sessions = months.map(m => data[m] ? data[m].sessions : 0);
        const leads = months.map(m => data[m] ? data[m].leads : 0);

        // Update Chart
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (chart) chart.destroy();
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: months,
                datasets: [
                    {
                        label: 'Sessions',
                        data: sessions,
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13, 110, 253, 0.1)',
                        fill: true,
                        tension: 0.3
                    },
                    {
                        label: 'Leads',
                        data: leads,
                        borderColor: '#dc3545',
                        backgroundColor: 'rgba(220, 53, 69, 0.1)',
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Sessions' } },
                    y1: { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Leads' } }
                }
            }
        });

        // Update Table
        let html = '<table class="table table-hover"><thead><tr><th>Month</th><th>Sessions</th><th>Engaged Sessions</th><th>Engagement Rate</th><th>Active Users</th><th>Leads</th></tr></thead><tbody>';
        months.forEach(m => {
            const mData = data[m] || { sessions: 0, engaged: 0, rate: '0%', users: 0, leads: 0 };
            html += `<tr>
                <td>${m}</td>
                <td>${Number(mData.sessions).toLocaleString()}</td>
                <td>${Number(mData.engaged).toLocaleString()}</td>
                <td>${mData.rate}</td>
                <td>${Number(mData.users).toLocaleString()}</td>
                <td>${Number(mData.leads).toLocaleString()}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('tableContent').innerHTML = html;
        document.getElementById('tableTitle').innerText = `Monthly Trend: ${channel}`;
    }

    document.getElementById('channelSelect').addEventListener('change', (e) => updateView(e.target.value));
    
    // Initial load
    updateView(document.getElementById('channelSelect').value);
</script>

</body>
</html>
