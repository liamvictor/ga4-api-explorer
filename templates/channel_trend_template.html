<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ report_title }} - {{ property_display_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html { height: 100%; }
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 2rem; }
    </style>
</head>
<body>

<header class="navbar navbar-expand-lg navbar-light bg-light border-bottom mb-4">
    <div class="container-fluid">
        <div class="d-flex align-items-baseline">
            <h1 class="h3 mb-0 me-4">{{ report_title }}</h1>
            <span class="text-muted me-4">{{ property_display_name }} ({{ property_id }})</span>
            <span class="text-muted me-4">{{ date_range }}</span>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="https://github.com/liamdelahunty/ga4-api-explorer" target="_blank">GitHub</a>
                </li>
            </ul>
        </div>
    </div>
</header>

<main class="container py-4 flex-grow-1">
    <div class="card">
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-4">
                    <label for="channelSelect" class="form-label fw-bold">Select Channel:</label>
                    <select id="channelSelect" class="form-select">
                        {% for channel in channels %}
                        <option value="{{ channel }}">{{ channel }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="metric1Select" class="form-label fw-bold">Primary Metric (Left Axis):</label>
                    <select id="metric1Select" class="form-select">
                        <option value="sessions" selected>Sessions</option>
                        <option value="engaged">Engaged Sessions</option>
                        <option value="users">Active Users</option>
                        <option value="leads">Leads</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="metric2Select" class="form-label fw-bold">Secondary Metric (Right Axis):</label>
                    <select id="metric2Select" class="form-select">
                        <option value="leads" selected>Leads</option>
                        <option value="sessions">Sessions</option>
                        <option value="engaged">Engaged Sessions</option>
                        <option value="users">Active Users</option>
                    </select>
                </div>
            </div>
            <div style="height: 400px;">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3 id="tableTitle">Monthly Trend</h3>
            <div id="tableContent" class="table-responsive">
                <!-- Table will be injected here -->
            </div>
        </div>
    </div>
</main>

<footer class="mt-3 bg-light border-top py-4">    
    <div class="container text-center text-secondary">
        <p>
            <a href="https://github.com/liamdelahunty/ga4-api-explorer" target="_blank">Github: ga4-api-explorer</a>
         </p>
    </div>
</footer>

<script>
    const rawData = {{ json_data | safe }};
    const months = {{ months | safe }};
    let chart = null;

    const metricLabels = {
        sessions: 'Sessions',
        engaged: 'Engaged Sessions',
        users: 'Active Users',
        leads: 'Leads'
    };

    const metricColors = {
        sessions: { border: '#0d6efd', bg: 'rgba(13, 110, 253, 0.1)' },
        engaged: { border: '#198754', bg: 'rgba(25, 135, 84, 0.1)' },
        users: { border: '#fd7e14', bg: 'rgba(253, 126, 20, 0.1)' },
        leads: { border: '#dc3545', bg: 'rgba(220, 53, 69, 0.1)' }
    };

    function updateView() {
        const channel = document.getElementById('channelSelect').value;
        const m1Key = document.getElementById('metric1Select').value;
        const m2Key = document.getElementById('metric2Select').value;
        
        const data = rawData[channel];
        const m1Data = months.map(m => data[m] ? data[m][m1Key] : 0);
        const m2Data = months.map(m => data[m] ? data[m][m2Key] : 0);

        // Update Chart
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (chart) chart.destroy();
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: months,
                datasets: [
                    {
                        label: metricLabels[m1Key],
                        data: m1Data,
                        borderColor: metricColors[m1Key].border,
                        backgroundColor: metricColors[m1Key].bg,
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y'
                    },
                    {
                        label: metricLabels[m2Key],
                        data: m2Data,
                        borderColor: metricColors[m2Key].border,
                        backgroundColor: metricColors[m2Key].bg,
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        title: { display: true, text: metricLabels[m1Key] } 
                    },
                    y1: { 
                        beginAtZero: true, 
                        position: 'right', 
                        grid: { drawOnChartArea: false }, 
                        title: { display: true, text: metricLabels[m2Key] } 
                    }
                }
            }
        });

        // Update Table
        let html = '<table class="table table-hover"><thead><tr><th>Month</th><th>Sessions</th><th>Engaged Sessions</th><th>Engagement Rate</th><th>Active Users</th><th>Leads</th></tr></thead><tbody>';
        months.forEach(m => {
            const mData = data[m] || { sessions: 0, engaged: 0, rate: '0%', users: 0, leads: 0 };
            html += `<tr>
                <td>${m}</td>
                <td>${Number(mData.sessions).toLocaleString()}</td>
                <td>${Number(mData.engaged).toLocaleString()}</td>
                <td>${mData.rate}</td>
                <td>${Number(mData.users).toLocaleString()}</td>
                <td>${Number(mData.leads).toLocaleString()}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('tableContent').innerHTML = html;
        document.getElementById('tableTitle').innerText = `Monthly Trend: ${channel}`;
    }

    document.getElementById('channelSelect').addEventListener('change', updateView);
    document.getElementById('metric1Select').addEventListener('change', updateView);
    document.getElementById('metric2Select').addEventListener('change', updateView);
    
    // Initial load
    updateView();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
